spring.application.name=library-assessment

# H2 Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Fault: Enabling H2 console but missing security configuration in a "production-like" setup
spring.h2.console.enabled=true

# Fault: Hibernate ddl-auto set to create-drop which is dangerous for production-like code if not justified
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
